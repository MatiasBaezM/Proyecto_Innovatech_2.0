server:
  port: 8080

spring:
  application:
    name: ms-api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: recursos-colaboraciones-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/trabajadores/**, /api/asignaciones/**

  main:
    web-application-type: reactive

  datasource:
    url: jdbc:mysql://localhost:3306/innovatech_db?createDatabaseIfNotExist=true
    username: root
    password: 
  jpa:
    hibernate:
      ddl-auto: update
