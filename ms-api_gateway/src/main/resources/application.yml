server:
  port: 8080

spring:
  application:
    name: ms-api-gateway
  cloud:
    gateway:
      routes:
        
        

        - id: recursos-colaboraciones-service
          uri: ${RECURSOS_COLABORACIONES_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/trabajadores/**, /api/asignaciones/**
          filters:
            - name: CircuitBreaker
              args:
                name: recursosCircuitBreaker
                fallbackUri: forward:/fallback

        - id: gestion-proyectos-service
          uri: ${GESTION_PROYECTOS_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/proyectos/**
          filters:
            - name: CircuitBreaker
              args:
                name: proyectosCircuitBreaker
                fallbackUri: forward:/fallback

        - id: analiticas-service
          uri: ${ANALITICAS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/analiticas/**
          filters:
            - name: CircuitBreaker
              args:
                name: analiticasCircuitBreaker
                fallbackUri: forward:/fallback

  main:
    web-application-type: reactive

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      authCircuitBreaker:
        base-config: default
      recursosCircuitBreaker:
        base-config: default
      proyectosCircuitBreaker:
        base-config: default
      analiticasCircuitBreaker:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 4s

# Actuator - Health checks para EKS/ALB
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
