apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: innovatech-prod-cluster
  region: us-east-1
  version: "1.30"

vpc:
  id: "vpc-0c0bcdc8b151ea321"
  subnets:
    public:
      us-east-1a: { id: "subnet-0ad50fe2e446e2d00" }
      us-east-1b: { id: "subnet-078790bcaaf5bea1c" }

iam:
  serviceRoleARN: "arn:aws:iam::813379123006:role/LabRole"

managedNodeGroups:
  - name: innovatech-nodes
    instanceType: t3.medium
    minSize: 1
    maxSize: 3
    desiredCapacity: 2
    iam:
      instanceRoleARN: "arn:aws:iam::813379123006:role/LabRole"
