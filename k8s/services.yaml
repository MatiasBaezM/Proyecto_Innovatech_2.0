  type: ClusterIP
  selector:
    app: ms-gestion-proyectos
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083

---
# ─── Analíticas (INTERNO) ────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ms-analiticas
  namespace: innovatech
  labels:
    app: ms-analiticas
spec:
  type: ClusterIP
  selector:
    app: ms-analiticas
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084
