# ─── API Gateway (PÚBLICO - LoadBalancer) ────────────────────
# Este es el ÚNICO servicio expuesto a internet.
# Kubernetes creará un AWS Load Balancer automáticamente.
apiVersion: v1
kind: Service
metadata:
  name: ms-api-gateway
  namespace: innovatech
  labels:
    app: ms-api-gateway
spec:
  type: LoadBalancer   # ← Esto crea un ALB público en AWS
  selector:
    app: ms-api-gateway
  ports:
    - protocol: TCP
      port: 80           # Puerto externo (la URL pública)
      targetPort: 8080    # Puerto interno del contenedor

---
# ─── Autenticación (INTERNO) ─────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ms-autenticacion
  namespace: innovatech
  labels:
    app: ms-autenticacion
spec:
  type: ClusterIP   # ← Solo accesible dentro del clúster
  selector:
    app: ms-autenticacion
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081

---
# ─── Recursos y Colaboraciones (INTERNO) ─────────────────────
apiVersion: v1
