spec:
  type: ClusterIP
  selector:
    app: ms-recursos-colaboraciones
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082

---
# ─── Gestión de Proyectos (INTERNO) ──────────────────────────
apiVersion: v1
kind: Service
